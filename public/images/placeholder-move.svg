<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0b2e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Circular dance silhouettes -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.2" stroke-dasharray="8 4"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.2" stroke-dasharray="6 3"/>
  <circle cx="200" cy="200" r="40" fill="none" stroke="#ffd93d" stroke-width="1.5" opacity="0.2"/>
  <!-- Dancer dots on the circle -->
  <circle cx="200" cy="80" r="6" fill="#4ecdc4" opacity="0.5"/>
  <circle cx="320" cy="200" r="6" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="200" cy="320" r="6" fill="#ffd93d" opacity="0.5"/>
  <circle cx="80" cy="200" r="6" fill="#a78bfa" opacity="0.5"/>
  <text x="200" y="205" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="12" letter-spacing="3">MOVE IMAGE</text>
</svg>